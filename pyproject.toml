[project]
name = "btc-manfiest"
version = "0.1.0"
description = "Metadata manifest curation CLI for the BTC project."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "boto3>=1.34",
    "openpyxl>=3.1",
    "pymongo>=4.6",
    "python-dotenv>=1.0",
    "typer>=0.12",
]

[project.scripts]
btc-manfiest = "btc_manifest.cli:main"

[dependency-groups]
dev = [
    "pytest>=8.0",
    "ruff>=0.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
line-length = 100
target-version = "py311"
